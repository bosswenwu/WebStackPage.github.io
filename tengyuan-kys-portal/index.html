<style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#182033;--muted:#667085;--line:#d9deea;--brand:#162a5f;--brand2:#1f4fd8;--ok:#087443;--warn:#b54708;--bad:#b42318;--soft:#eef4ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,Arial,"Microsoft YaHei",sans-serif}.top{height:64px;background:#0f1f4d;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:0 6px 18px #10182822}.brand{font-weight:800;letter-spacing:.2px}.brand span{font-weight:500;color:#bfd0ff;margin-left:12px}.actions button,.lang button,.btn{border:1px solid #cbd5e1;background:#fff;color:#172554;border-radius:10px;padding:9px 13px;font-weight:700;cursor:pointer}.top .actions button{background:#1d4ed8;color:#fff;border:0}.wrap{display:grid;grid-template-columns:260px minmax(0,1fr) 300px;gap:18px;padding:18px}.side,.risk,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 18px #1018280f}.side{position:sticky;top:82px;height:calc(100vh - 100px);padding:14px;overflow:auto}.side h3,.risk h3{margin:8px 10px 12px;font-size:15px}.nav button{width:100%;text-align:left;border:0;background:transparent;border-radius:12px;padding:11px 12px;color:#344054;font-weight:700;cursor:pointer}.nav button.active{background:#eaf0ff;color:#1d4ed8}.main{min-width:0}.hero{background:linear-gradient(135deg,#10245c,#1d4ed8);color:white;border-radius:18px;padding:22px;margin-bottom:16px}.hero h1{margin:0 0 8px;font-size:25px}.hero p{margin:0;color:#dbe7ff}.lang{display:flex;gap:8px;margin-top:14px}.lang button.active{background:#0f1f4d;color:#fff;border-color:#0f1f4d}.card{padding:18px;margin-bottom:16px}.card h2{margin:0 0 4px;font-size:21px}.hint{color:var(--muted);font-size:13px;margin-bottom:16px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:6px;color:#344054}.field small{display:block;color:#667085;font-weight:500;margin-top:3px}.field input,.field textarea,.field select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 11px;background:#fff;font:inherit}.field textarea{min-height:78px;resize:vertical}.full{grid-column:1/-1}.radio{display:flex;gap:10px;flex-wrap:wrap}.pill{border:1px solid #cbd5e1;border-radius:999px;padding:8px 12px;background:#fff;cursor:pointer}.pill input{margin-right:6px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border:1px solid #d9deea;padding:8px;text-align:left}th{background:#f8fafc}td input,td select{width:100%;border:0;background:transparent;outline:0}.risk{position:sticky;top:82px;height:calc(100vh - 100px);padding:14px;overflow:auto}.score{font-size:42px;font-weight:900;margin:8px 10px}.badge{display:inline-block;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}.low{background:#ecfdf3;color:var(--ok)}.med{background:#fffaeb;color:var(--warn)}.high{background:#fef3f2;color:var(--bad)}.flag{border-left:4px solid #f59e0b;background:#fffbeb;border-radius:8px;padding:9px;margin:8px 0;font-size:13px}.req{color:#d92d20}.footer{font-size:12px;color:#667085;text-align:center;padding:20px}.hidden{display:none}@media(max-width:1050px){.wrap{grid-template-columns:1fr}.side,.risk{position:static;height:auto}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="top"><div class="brand">Tengyuan Supplier Due Diligence Portal <span>KYS Questionnaire</span></div><div class="actions"><button onclick="saveDraft()" id="saveBtn">保存草稿</button> <button onclick="exportJSON()" id="exportBtn">导出提交包</button></div></header>
<div class="wrap">
<aside class="side"><h3 data-zh="任务导航" data-en="Task Navigation">任务导航</h3><div class="nav" id="nav"></div></aside>
<main class="main">
<section class="hero"><h1 data-zh="供应商 KYS 在线调查问卷" data-en="Supplier KYS Online Questionnaire">供应商 KYS 在线调查问卷</h1><p data-zh="请完整填写以下信息，并上传/列明必要证据。红旗问题会自动进入右侧风险预筛。" data-en="Please complete the questionnaire and provide required evidence. Red-flag answers are screened on the right.">请完整填写以下信息，并上传/列明必要证据。红旗问题会自动进入右侧风险预筛。</p><div class="lang"><button onclick="setLang('zh')" id="lzh">中文</button><button onclick="setLang('en')" id="len">English</button><button onclick="setLang('bi')" id="lbi">中英双语</button></div></section>
<div id="sections"></div>
<div class="footer">Ganzhou Tengyuan Cobalt New Material Co., Ltd. · Supplier Responsible Sourcing Due Diligence</div>
</main>
<aside class="risk"><h3 data-zh="风险预筛" data-en="Risk Pre-screening">风险预筛</h3><div class="score" id="score">0</div><span class="badge low" id="level">LOW</span><div class="hint" id="riskHint" data-zh="根据供应商回答自动识别红旗。" data-en="Red flags are generated based on supplier responses.">根据供应商回答自动识别红旗。</div><div id="flags"></div><hr><h3 data-zh="证据清单" data-en="Evidence Checklist">证据清单</h3><div id="evidence"></div></aside>
</div>
<script>
const sections=[
{id:'company',zh:'1. 公司详情',en:'1. Company Details',hintZh:'注册、地址、网站、审计、制裁、政府/军方关联、原料来源、仓库。',hintEn:'Registration, address, audit, sanctions, political/military links, raw material source and warehouse.',fields:[['text','name','名称','Name',true],['text','reg_address','注册地址','Registered address',true],['text','business_address','营业地址','Business address'],['date','incorporation_date','注册日期','Date of incorporation'],['text','country','注册国家','Country of incorporation',true],['text','business_no','公司注册号','Business registration number'],['text','tax_no','税务识别号','Tax identification number'],['url','website','网站','Website'],['yesno','audit','公司是否进行了审计？','Has your company undergone an audit?',false,'evidence'],['yesno','sanctions','公司/股东/高管是否被列入制裁名单？','Are the company/shareholders/senior executives listed on sanctions lists?',false,'red'],['yesno','gov_military','业务、股东、高管或供应链参与方是否关联政府、政治或军事实体？','Are operations, owners, management or supply chain participants connected to government, political or military entities?',false,'red'],['yesno','lsm','原料是否来自 LSM 大规模矿区？','Do raw mineral materials come from LSM sites?'],['yesno','asm','原料是否来自 ASM 手工/小规模矿区？','Do raw mineral materials come from ASM sites?',false,'red'],['yesno','warehouse','是否有自己的仓库？','Does your company have its own warehouse?'],['yesno','traceability','仓库是否支持物料来源、流向和状态追溯？','Does the warehouse support traceability of origin, flow and status?',false,'redNo']]},
{id:'business',zh:'2. 业务活动',en:'2. Business Activity',hintZh:'说明供应商在供应链中的角色。',hintEn:'Describe the supplier role in the supply chain.',fields:[['select','business_type','公司类型','Type of business',true,['LSM company','ASM/small mining company','International trading company','Smeltery','Processing company','Recycling company','Transport company','Customs clearance company','Other']],['textarea','core_business','核心业务活动描述','Description of core business activity',true]]},
{id:'ownership',zh:'3. 所有权 / UBO',en:'3. Ownership / UBO',hintZh:'股东、最终受益所有人和制裁筛查。',hintEn:'Shareholders, ultimate beneficial owners and sanctions screening.',table:'ownership'},
{id:'management',zh:'4. 管理层结构',en:'4. Management Structure',hintZh:'董事会和高管信息。',hintEn:'Board and senior management information.',table:'management'},
{id:'finance',zh:'5. 财务信息',en:'5. Financial Information',hintZh:'财务报表、资金来源和付款方式。',hintEn:'Financial statement, funding source and payment methods.',fields:[['text','currency','币种','Currency'],['text','last_period','上次报告期间','Last reporting period'],['number','sales','销售额','Sales'],['number','net_income','净利润','Net income'],['select','funding','营运资金来源','Source of operational funding',false,['Own equity','Government entity','Bank loan','Third party loan','Other']],['number','cash_payment','现金付款比例 %','Cash payment percentage %',false,'redCash']]},
{id:'regulatory',zh:'6. 监管环境',en:'6. Regulatory Environment',hintZh:'法律合规、劳动、人权、环境、社区、文化遗产和生物多样性。',hintEn:'Legal compliance, labor, human rights, environment, community, culture/heritage and biodiversity.',fields:[['yesno','law_compliance','是否遵守运营国、产地国、中转/再出口国法律？','Comply with laws of operation, origin, transit/re-export countries?'],['yesno','labor_law','是否遵守用工法律和反歧视要求？','Comply with labor laws and non-discrimination?'],['yesno','union','雇员是否享有组建工会和结社自由？','Do employees have union and freedom of association rights?'],['yesno','ehs','是否遵守环境、职业健康安全法规？','Comply with EHS regulations?',false,'evidence'],['yesno','child_forced_labor_regulated','运营地采矿是否监管童工和强迫劳动？','Are child labor and forced labor regulated in mining activity?'],['yesno','public_security','矿区/采购矿区周围是否动用公共安全武装？','Are public security forces used on or around mine sites?',false,'red'],['yesno','indigenous','是否保护土著权益并支持社区发展？','Protect Indigenous rights and support local communities?'],['yesno','heritage','是否尊重和保护土著文化/遗产？','Respect and protect Indigenous culture and heritage?'],['yesno','biodiversity','资源开采是否保护生物多样性？','Protect biodiversity during resource extraction?']]},
{id:'tax',zh:'7. 税费支付',en:'7. Tax and Fee Payments',hintZh:'矿产贸易、开采、运输、出口过程的税费和其他付款。',hintEn:'Taxes, fees and other payments in mineral extraction, trade, transport and export.',fields:[['yesno','pay_fees','是否依法缴纳矿产贸易相关费用？','Comply with legal requirements to pay mineral trade fees?'],['yesno','aware_taxes','是否清楚向政府支付的税金、费用、特许权使用费？','Aware of taxes, fees or royalties paid to government?'],['yesno','official_payments','是否清楚向政府官员支付的任何其他款项？','Aware of any other payments to government officials?',false,'red'],['yesno','security_payments','是否清楚向公共/私人安全部队或其他团体支付的款项？','Aware of payments to public/private security forces or other groups?',false,'red']]},
{id:'mining',zh:'8. 采矿实践',en:'8. Mining Practices',hintZh:'矿区、地点、许可证、产量、人员、提取方式。',hintEn:'Mine sites, location, license, production, workforce and extraction methods.',fields:[['select','source_from','原料采购来源','Where do you source raw mineral material from?',true,['Own mines','2nd or 3rd parties - LSM','2nd or 3rd parties - ASM']],['number','mine_count','采购矿区数量','Number of mining sites'],['textarea','mine_names','矿区名称和类型 ASM/LSM','Names and types of mining sites'],['textarea','mine_location','矿区位置：国家/省/城市/GPS','Mine location: country/province/city/GPS'],['text','mine_distance','矿区至运营中心/仓库距离','Distance to operation/storage facility'],['text','daily_production','矿区每日产量','Daily production'],['number','mine_workers','矿区人数','Number of people working on site'],['yesno','mining_license','矿区是否依法要求持有采矿许可证？','Are mining sites legally required to hold mining licenses?',false,'evidence'],['textarea','extraction_method','提取方法和设备','Extraction methods and equipment']]},
{id:'transport',zh:'9. 运输',en:'9. Transportation',hintZh:'矿区至仓库、粗处理厂、精炼厂、出口路线和检查站。',hintEn:'Routes from mine to warehouse, processor, refinery, export and checkpoints.',fields:[['select','transport_mine_storage','矿区至运营中心/仓库运输方式','Transport from mine to operation/storage facility',false,['Own company','Third party truck','Third party trailer','Other']],['text','transport_company','第三方运输公司名称','Third-party transport company name'],['textarea','route','从矿山到粗处理厂、精炼厂、出口经过的城市/国家','Cities/countries passed from mine to processor/refinery/export'],['yesno','checkpoints','沿路是否有军事/警察检查站？','Any military/police checkpoints along the route?',false,'red'],['textarea','checkpoint_details','如有，请说明数量和目的','If yes, state number and purpose']]},
{id:'rs',zh:'10. 负责任采购实践',en:'10. Responsible Sourcing Practices',hintZh:'安全、环境、社区、童工、武装团体、事故、政策、第三方审核。',hintEn:'Safety, environment, community, child labor, armed groups, incidents, policies and audits.',fields:[['yesno','safety_policy','矿区是否有保障人员安全的程序/制度/政策？','Procedures/systems/policies to ensure mine site personnel safety?',false,'evidence'],['yesno','env_policy','矿区是否有避免环境负面影响的程序/制度/政策？','Procedures/systems/policies to avoid environmental impacts?',false,'evidence'],['yesno','community','矿区是否参与受影响社区并支持社区发展？','Mine site engages affected communities and supports development?'],['yesno','child_labor_policy','矿区是否有防范童工的程序/制度/政策？','Procedures/systems/policies to prevent child labor?',false,'evidence'],['yesno','armed_groups','矿区或附近是否存在武装团体？','Any armed groups operating on or near mine sites?',false,'red'],['yesno','regulator_visit','监管机构是否进行现场踏勘？','Has the mining regulator carried out on-site visits?',false,'evidence'],['multi','incidents','是否知悉采购过程中发生以下事故？','Are you aware of incidents in sourcing process?',false,['Child labor','Human rights abuses','Support to armed groups/security forces','Bribery/origin fraud','Money laundering','Non-payment of taxes/fees/royalties','Life-threatening OHS','Discrimination/freedom of association','Environmental protection','Indigenous/community impacts','Culture/heritage/protected areas','No issues']],['yesno','rs_policy','公司是否有负责任采购政策？','Does the company have responsible sourcing policy?',false,'evidence'],['yesno','policy_oecd_cccmc','政策是否符合 CCCMC/OECD 指南？','Are policies consistent with CCCMC/OECD Guidance?'],['text','industry_scheme','参与的行业计划，例如 RMI/RCI/RMAP','Industry scheme, e.g. RMI/RCI/RMAP'],['yesno','third_party_audit','是否开展独立第三方尽责管理审核？','Independent third-party due diligence audit?',false,'evidence']]},
{id:'map',zh:'11. 供应链地图',en:'11. Supply Chain Map',hintZh:'按 Tier 1–4 填写供应链参与方、位置、角色、证据。',hintEn:'Fill Tier 1–4 supply chain participants, locations, roles and evidence.',table:'map'},
{id:'sign',zh:'12. 签署声明',en:'12. Signature',hintZh:'供应商声明信息真实，并承诺重大变化及时通知。',hintEn:'Supplier declares information is true and undertakes to report material changes.',fields:[['text','sign_company','公司名称','Company name',true],['text','sign_name','签名人','Signature / Name',true],['text','sign_title','职位','Title'],['date','sign_date','日期','Date',true],['textarea','declaration','补充声明','Additional declaration']]}
];
let lang='zh';const data={};
function t(zh,en){return lang==='zh'?zh:lang==='en'?en:zh+' / '+en}
function field(f){let [type,key,zh,en,req,opt]=f;let label=t(zh,en)+(req?' <span class="req">*</span>':'');if(type==='yesno')return `<div class="field"><label>${label}</label><div class="radio"><label class="pill"><input type="radio" name="${key}" value="yes" onchange="upd('${key}',this.value,'${opt||''}')">${t('是','Yes')}</label><label class="pill"><input type="radio" name="${key}" value="no" onchange="upd('${key}',this.value,'${opt||''}')">${t('否','No')}</label></div><textarea id="${key}_detail" class="hidden" placeholder="${t('请说明 / 证据文件名','Describe / evidence file names')}"></textarea></div>`;if(type==='textarea')return `<div class="field full"><label>${label}</label><textarea id="${key}" oninput="upd('${key}',this.value,'${opt||''}')"></textarea></div>`;if(type==='select')return `<div class="field"><label>${label}</label><select id="${key}" onchange="upd('${key}',this.value,'${opt||''}')"><option value="">${t('请选择','Select')}</option>${(Array.isArray(opt)?opt:[]).map(x=>`<option>${x}</option>`).join('')}</select></div>`;if(type==='multi')return `<div class="field full"><label>${label}</label><div class="radio">${opt.map(x=>`<label class="pill"><input type="checkbox" name="${key}" value="${x}" onchange="multi('${key}')">${x}</label>`).join('')}</div></div>`;return `<div class="field"><label>${label}</label><input id="${key}" type="${type}" oninput="upd('${key}',this.value,'${opt||''}')"></div>`}
function table(kind){if(kind==='ownership')return `<table><thead><tr><th>%</th><th>${t('名称/姓名','Name')}</th><th>${t('地址','Address')}</th><th>${t('注册国家/国籍','Country/Nationality')}</th><th>${t('是否受制裁','Sanctioned?')}</th></tr></thead><tbody id="ownershipRows"></tbody></table><button class="btn" onclick="addRow('ownership')">+ ${t('新增股东/UBO','Add shareholder/UBO')}</button>`;if(kind==='management')return `<table><thead><tr><th>${t('姓名','Name')}</th><th>${t('职位','Title')}</th><th>${t('国籍','Nationality')}</th><th>${t('是否受制裁','Sanctioned?')}</th></tr></thead><tbody id="managementRows"></tbody></table><button class="btn" onclick="addRow('management')">+ ${t('新增管理人员','Add management')}</button>`;return `<table><thead><tr><th>Tier</th><th>${t('公司/矿区','Company / Mine')}</th><th>${t('角色','Role')}</th><th>${t('国家/省/城市/GPS','Country/Province/City/GPS')}</th><th>${t('物料','Material')}</th><th>${t('证据','Evidence')}</th></tr></thead><tbody id="mapRows"></tbody></table><button class="btn" onclick="addRow('map')">+ ${t('新增供应链节点','Add supply chain node')}</button><button class="btn" onclick="exportCSV()">${t('导出供应链地图CSV','Export Supply Chain Map CSV')}</button>`}
function render(){document.querySelectorAll('[data-zh]').forEach(e=>e.textContent=t(e.dataset.zh,e.dataset.en));document.getElementById('saveBtn').textContent=t('保存草稿','Save draft');document.getElementById('exportBtn').textContent=t('导出提交包','Export package');['zh','en','bi'].forEach(x=>document.getElementById('l'+x).classList.toggle('active',lang===x));document.getElementById('nav').innerHTML=sections.map((s,i)=>`<button onclick="go('${s.id}')" id="n_${s.id}" class="${i?'':'active'}">${t(s.zh,s.en)}</button>`).join('');document.getElementById('sections').innerHTML=sections.map(s=>`<section class="card" id="${s.id}"><h2>${t(s.zh,s.en)}</h2><div class="hint">${t(s.hintZh,s.hintEn)}</div>${s.table?table(s.table):`<div class="grid">${s.fields.map(field).join('')}</div>`}</section>`).join('');addRow('ownership');addRow('management');addRow('map');calc()}
function setLang(x){lang=x;render()}
function go(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById('n_'+id).classList.add('active')}
function upd(k,v,opt){data[k]=v;let d=document.getElementById(k+'_detail');if(d)d.classList.toggle('hidden',!(v==='yes'||opt==='evidence'));calc()}
function multi(k){data[k]=[...document.querySelectorAll(`input[name=${k}]:checked`)].map(x=>x.value);calc()}
function addRow(kind){let tb=document.getElementById(kind+'Rows');if(!tb)return;let tr=document.createElement('tr');if(kind==='ownership')tr.innerHTML='<td><input></td><td><input></td><td><input></td><td><input></td><td><select><option>No</option><option>Yes</option></select></td>';else if(kind==='management')tr.innerHTML='<td><input></td><td><input></td><td><input></td><td><select><option>No</option><option>Yes</option></select></td>';else tr.innerHTML='<td><select><option>Tier 1</option><option>Tier 2</option><option>Tier 3</option><option>Tier 4 Mine</option></select></td><td><input></td><td><input></td><td><input></td><td><input></td><td><input></td>';tb.appendChild(tr)}
function calc(){let score=0,flags=[];function flag(k,txt,pts=10){if(data[k]==='yes'||(k==='traceability'&&data[k]==='no')){score+=pts;flags.push(txt)}}flag('sanctions',t('存在制裁名单命中，需要立即升级审查。','Sanctions hit; escalate immediately.'),30);flag('gov_military',t('存在政府/政治/军方关联。','Government/political/military connection.'),15);flag('asm',t('原料涉及 ASM，需要单独风险识别、缓解和追溯证据。','ASM sourcing requires separate risk assessment, mitigation and traceability evidence.'),20);if(data.cash_payment&&Number(data.cash_payment)>0){score+=10;flags.push(t('存在现金付款比例。','Cash payment percentage disclosed.'))}flag('traceability',t('仓库追溯能力不足。','Warehouse traceability is insufficient.'),15);flag('public_security',t('矿区或周边动用公共安全武装。','Public security forces around mine sites.'),15);flag('official_payments',t('存在向政府官员其他付款的红旗。','Other payments to government officials red flag.'),20);flag('security_payments',t('存在向安全部队/其他团体付款的红旗。','Payments to security forces/other groups red flag.'),20);flag('checkpoints',t('运输路线存在军事/警察检查站。','Military/police checkpoints on transport route.'),10);flag('armed_groups',t('矿区或附近存在武装团体。','Armed groups near mine sites.'),30);let inc=data.incidents||[];if(inc.length&&!(inc.length===1&&inc[0]==='No issues')){score+=25;flags.push(t('供应商披露采购过程事故。','Incidents disclosed in sourcing process.'))}document.getElementById('score').textContent=score;let level=document.getElementById('level');level.className='badge '+(score>=50?'high':score>=20?'med':'low');level.textContent=score>=50?'HIGH':score>=20?'MEDIUM':'LOW';document.getElementById('flags').innerHTML=flags.length?flags.map(x=>`<div class="flag">${x}</div>`).join(''):`<div class="hint">${t('暂无红旗。','No red flags yet.')}</div>`;document.getElementById('evidence').innerHTML=['Business license','Group chart','Latest annual report','Audit/certification','Mining license','Responsible sourcing policy','EHS/ISO certificates','Transport route evidence','Tax/royalty payment evidence'].map(x=>`<div class="flag">${x}</div>`).join('')}
function collect(){document.querySelectorAll('input,textarea,select').forEach(e=>{if(e.id)data[e.id]=e.value});return {company:'Ganzhou Tengyuan Cobalt New Material Co., Ltd.',form:'Supplier KYS Questionnaire',language:lang,submitted_at:new Date().toISOString(),answers:data,risk_score:document.getElementById('score').textContent,risk_level:document.getElementById('level').textContent}}
function saveDraft(){localStorage.setItem('tengyuan_kys_draft',JSON.stringify(collect()));alert(t('草稿已保存在本浏览器。','Draft saved in this browser.'))}
function exportJSON(){let blob=new Blob([JSON.stringify(collect(),null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='tengyuan_supplier_kys_submission.json';a.click()}
function exportCSV(){let rows=[['Tier','Company/Mine','Role','Location','Material','Evidence']];document.querySelectorAll('#mapRows tr').forEach(tr=>rows.push([...tr.querySelectorAll('input,select')].map(x=>x.value)));let csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');let blob=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='supply_chain_map.csv';a.click()}
render();
</script>
</body></html>
