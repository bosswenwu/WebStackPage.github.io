<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0b5f4b">
  <title>腾远钴业测试 App</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#eef5f2,#f8faf9);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;color:#14211d}.card{width:min(100%,430px);background:#fff;border:1px solid #dfe8e4;border-radius:28px;padding:30px 24px;box-shadow:0 22px 60px rgba(21,69,54,.12);text-align:center}.logo{width:82px;height:82px;border-radius:20px;display:grid;place-items:center;margin:0 auto 18px;background:#0b5f4b;color:#fff;font-size:28px;font-weight:800}h1{font-size:27px;margin:0 0 10px}p{margin:0 0 22px;color:#5d6b66;line-height:1.65}.btn{width:100%;border:0;border-radius:15px;padding:16px 18px;background:#0b5f4b;color:#fff;font-size:18px;font-weight:750;cursor:pointer}.btn:disabled{opacity:.55}.steps{margin-top:22px;text-align:left;background:#f4f7f6;border-radius:16px;padding:16px;color:#46544f;font-size:14px;line-height:1.8}.status{min-height:24px;margin-top:14px;font-size:14px;color:#0b5f4b}.site{display:block;margin-top:17px;color:#0b5f4b;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">TY</div>
    <h1>腾远钴业测试 App</h1>
    <p>安装后，iPhone 桌面会出现“腾远钴业”图标。打开后直接进入官网原始地址，不修改官网内容和链接。</p>
    <button class="btn" id="install">下载测试 App</button>
    <div class="status" id="status"></div>
    <div class="steps"><b>下载后：</b><br>1. 打开 iPhone“设置”<br>2. 点击“已下载描述文件”<br>3. 选择“腾远钴业官网”并安装<br>4. 返回桌面打开图标</div>
    <a class="site" href="https://www.tycogz.com/">先打开官网测试</a>
  </main>
<script>
const button=document.getElementById('install');
const status=document.getElementById('status');
button.addEventListener('click',async()=>{
  button.disabled=true; status.textContent='正在准备安装文件…';
  try{
    const response=await fetch('./install.mobileconfig',{cache:'no-store'});
    if(!response.ok) throw new Error('download failed');
    const buffer=await response.arrayBuffer();
    const blob=new Blob([buffer],{type:'application/x-apple-aspen-config'});
    const url=URL.createObjectURL(blob);
    const link=document.createElement('a');
    link.href=url; link.download='Tengyuan-Cobalt-Test-App.mobileconfig';
    document.body.appendChild(link); link.click(); link.remove();
    setTimeout(()=>URL.revokeObjectURL(url),30000);
    status.textContent='已开始下载，请到“设置”中安装。';
  }catch(error){
    status.textContent='下载失败，请点下方官网链接后重试。';
  }finally{button.disabled=false;}
});
</script>
</body>
</html>
